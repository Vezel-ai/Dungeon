<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>線画3Dダンジョン（ウィザードリィ風）</title>

<style>
body {
    background: #000;
    color: #fff;
    text-align: center;

}
#view {
    background: #000;
    margin: 20px auto;
    border: 2px solid #555;
}
#controls { margin: 10px; }

#minimap {

}
</style>
</head>

    <button id="backward">↓ 後退</button>
